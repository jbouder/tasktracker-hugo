# Deploy the Hugo docs site to GitHub Pages.
#
# The docs are the whole Pages site, served at https://jbouder.github.io/tasktracker-hugo/.
#
# The Nebari theme is consumed as a published Hugo Module (pinned in docs/go.mod);
# Go (set up below) fetches it and Hugo auto-downloads its transitive Hextra dep.
name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.163.3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build docs
        working-directory: docs
        env:
          HUGO_ENV: production
        run: hugo --gc --minify --baseURL "https://jbouder.github.io/tasktracker-hugo/"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
